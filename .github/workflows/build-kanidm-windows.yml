name: Build new Kanidm Windows releases

on:
  # Check Kanidm every 6 hours.
  schedule:
    - cron: "17 */6 * * *"

  # Also allow you to run the check manually.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kanidm-windows-release
  cancel-in-progress: false

jobs:
  check-build-release:
    runs-on: windows-2022

    steps:
      - name: Find latest Kanidm release
        id: kanidm
        shell: pwsh
        run: |
          $headers = @{
            "Accept"     = "application/vnd.github+json"
            "User-Agent" = "kanidm-windows-client-builder"
          }

          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/kanidm/kanidm/releases/latest" `
            -Headers $headers

          $tag = $release.tag_name

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "GitHub did not return a Kanidm release tag."
          }

          if ($tag -notmatch '^v?(\d+)\.(\d+)\.(\d+)') {
            throw "Kanidm release tag '$tag' is not a supported version."
          }

          $version = "$($Matches[1]).$($Matches[2]).$($Matches[3])"

          Write-Host "Latest Kanidm release is $tag"
          "tag=$tag" | Out-File `
            -FilePath $env:GITHUB_OUTPUT `
            -Encoding utf8 `
            -Append
          "version=$version" | Out-File `
            -FilePath $env:GITHUB_OUTPUT `
            -Encoding utf8 `
            -Append

      - name: Check whether we already published it
        id: existing
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          KANIDM_TAG: ${{ steps.kanidm.outputs.tag }}
          MANUAL_RUN: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          gh release view $env:KANIDM_TAG `
            --repo $env:GITHUB_REPOSITORY *> $null

          $releaseExists = $LASTEXITCODE -eq 0
          $isManualRun = $env:MANUAL_RUN -eq "true"
          $shouldBuild = -not $releaseExists -or $isManualRun

          if ($releaseExists -and -not $isManualRun) {
            Write-Host "Release $env:KANIDM_TAG already exists. Scheduled build is not needed."
          }
          elseif ($releaseExists) {
            Write-Host "Release $env:KANIDM_TAG already exists, but this is a manual run. Rebuilding its assets."
          }
          else {
            Write-Host "Release $env:KANIDM_TAG does not exist yet. Continuing with build."
          }

          "exists=$($releaseExists.ToString().ToLowerInvariant())" | Out-File `
            -FilePath $env:GITHUB_OUTPUT `
            -Encoding utf8 `
            -Append
          "build=$($shouldBuild.ToString().ToLowerInvariant())" | Out-File `
            -FilePath $env:GITHUB_OUTPUT `
            -Encoding utf8 `
            -Append

          # Prevent the expected gh exit code from failing this Actions step.
          exit 0

      - name: Check out installer sources
        if: steps.existing.outputs.build == 'true'
        uses: actions/checkout@v4
        with:
          path: builder

      - name: Download Kanidm source
        if: steps.existing.outputs.build == 'true'
        uses: actions/checkout@v4
        with:
          repository: kanidm/kanidm
          ref: ${{ steps.kanidm.outputs.tag }}
          path: kanidm
          persist-credentials: false

      - name: Install Rust
        if: steps.existing.outputs.build == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Build Kanidm CLI
        if: steps.existing.outputs.build == 'true'
        working-directory: kanidm
        shell: pwsh
        env:
          KANIDM_BUILD_PROFILE: windows_client
          CARGO_NET_RETRY: "10"
          CARGO_HTTP_TIMEOUT: "600"
          CARGO_HTTP_MULTIPLEXING: "false"
        run: |
          # Kanidm's profile build script generates KANIDM_CLIENT_CONFIG_PATH
          # itself, so setting that variable directly is ineffective. Create a
          # Windows-specific profile and select it for this build instead.
          $profilePath = "libs\profiles\windows_client.toml"
          $profile = Get-Content `
            "libs\profiles\developer.toml" `
            -Raw
          $profile = $profile -replace `
            '(?m)^client_config_path\s*=.*$', `
            'client_config_path = "C:/ProgramData/Kanidm/config"'
          Set-Content `
            -Path $profilePath `
            -Value $profile `
            -Encoding utf8 `
            -NoNewline

          $buildArguments = @(
            "build"
            "--locked"
            "--release"
            "--package"
            "kanidm_tools"
            "--bin"
            "kanidm"
          )

          for ($attempt = 1; $attempt -le 3; $attempt++) {
            Write-Host "Cargo build attempt $attempt of 3"
            & cargo @buildArguments

            if ($LASTEXITCODE -eq 0) {
              break
            }

            if ($attempt -eq 3) {
              throw "Cargo build failed after 3 attempts."
            }

            $delay = 15 * $attempt
            Write-Warning "Cargo build failed. Retrying in $delay seconds."
            Start-Sleep -Seconds $delay
          }

          $expectedConfigPath = "C:/ProgramData/Kanidm/config"
          $binaryBytes = [System.IO.File]::ReadAllBytes(
            "target\release\kanidm.exe"
          )
          $binaryText = [System.Text.Encoding]::UTF8.GetString($binaryBytes)
          if (-not $binaryText.Contains($expectedConfigPath)) {
            throw "Kanidm was not built with the Windows client config path."
          }

      - name: Package portable Windows client
        if: steps.existing.outputs.build == 'true'
        id: package
        shell: pwsh
        env:
          KANIDM_TAG: ${{ steps.kanidm.outputs.tag }}
        run: |
          $packageName = "kanidm-windows-x86_64-$env:KANIDM_TAG"
          $artifactDirectory = Join-Path $PWD "artifacts"
          $packageDirectory = Join-Path $artifactDirectory "package"
          $zipPath = Join-Path $artifactDirectory "$packageName.zip"

          New-Item `
            -ItemType Directory `
            -Path $packageDirectory `
            -Force | Out-Null

          Copy-Item `
            "kanidm\target\release\kanidm.exe" `
            "$packageDirectory\kanidm.exe"

          @"
          Kanidm Windows CLI $env:KANIDM_TAG

          This is an unofficial Windows build produced from the corresponding
          upstream Kanidm release source:

          https://github.com/kanidm/kanidm/releases/tag/$env:KANIDM_TAG

          Run:
            kanidm.exe --help

          This repository is not affiliated with the Kanidm project.
          "@ | Set-Content `
            "$packageDirectory\README.txt" `
            -Encoding utf8

          Compress-Archive `
            -Path "$packageDirectory\*" `
            -DestinationPath $zipPath `
            -Force

          "package_name=$packageName" | Out-File `
            -FilePath $env:GITHUB_OUTPUT `
            -Encoding utf8 `
            -Append

      - name: Install WiX Toolset
        if: steps.existing.outputs.build == 'true'
        shell: pwsh
        run: |
          dotnet tool install wix --tool-path .wix --version 6.0.2
          & .wix\wix.exe extension add --global WixToolset.UI.wixext/6.0.2

      - name: Build installer custom actions
        if: steps.existing.outputs.build == 'true'
        shell: pwsh
        run: |
          dotnet build builder\installer\CustomActions\KanidmCustomActions.csproj `
            --configuration Release `
            -p:Platform=x64 `
            --output artifacts\custom-actions

      - name: Create MSI installer
        if: steps.existing.outputs.build == 'true'
        shell: pwsh
        env:
          KANIDM_VERSION: ${{ steps.kanidm.outputs.version }}
          PACKAGE_NAME: ${{ steps.package.outputs.package_name }}
        run: |
          & .wix\wix.exe build builder\installer\kanidm-client.wxs `
            -arch x64 `
            -ext WixToolset.UI.wixext `
            -d ClientExe="$env:GITHUB_WORKSPACE\kanidm\target\release\kanidm.exe" `
            -d CustomActionDll="$env:GITHUB_WORKSPACE\artifacts\custom-actions\KanidmCustomActions.CA.dll" `
            -d ProductVersion="$env:KANIDM_VERSION" `
            -o "artifacts\$env:PACKAGE_NAME.msi"

      - name: Create checksums
        if: steps.existing.outputs.build == 'true'
        shell: pwsh
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.package_name }}
        run: |
          foreach ($extension in @("zip", "msi")) {
            $artifactName = "$env:PACKAGE_NAME.$extension"
            $artifactPath = Join-Path "artifacts" $artifactName
            $hash = Get-FileHash `
              -Path $artifactPath `
              -Algorithm SHA256

            "$($hash.Hash.ToLower())  $artifactName" |
              Set-Content `
                "$artifactPath.sha256" `
                -Encoding ascii
          }

      - name: Publish release assets
        if: steps.existing.outputs.build == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          KANIDM_TAG: ${{ steps.kanidm.outputs.tag }}
          PACKAGE_NAME: ${{ steps.package.outputs.package_name }}
          RELEASE_EXISTS: ${{ steps.existing.outputs.exists }}
        run: |
          $notes = @"
          Unofficial native Windows build of the Kanidm CLI from upstream
          Kanidm release **$env:KANIDM_TAG**.

          Included:

          - Portable ZIP archive
          - MSI installer for ``C:\Program Files\Kanidm`` and the system ``PATH``
          - SHA-256 checksums

          Upstream source release:
          https://github.com/kanidm/kanidm/releases/tag/$env:KANIDM_TAG

          This build is provided independently and is not an official Kanidm
          release. Verify and test it before relying on it for administrative
          access.
          "@

          if ($env:RELEASE_EXISTS -eq "true") {
            gh release upload $env:KANIDM_TAG `
              "artifacts\$env:PACKAGE_NAME.zip" `
              "artifacts\$env:PACKAGE_NAME.zip.sha256" `
              "artifacts\$env:PACKAGE_NAME.msi" `
              "artifacts\$env:PACKAGE_NAME.msi.sha256" `
              --repo $env:GITHUB_REPOSITORY `
              --clobber

            gh release edit $env:KANIDM_TAG `
              --repo $env:GITHUB_REPOSITORY `
              --title "Kanidm Windows CLI $env:KANIDM_TAG" `
              --notes $notes
          }
          else {
            gh release create $env:KANIDM_TAG `
              "artifacts\$env:PACKAGE_NAME.zip" `
              "artifacts\$env:PACKAGE_NAME.zip.sha256" `
              "artifacts\$env:PACKAGE_NAME.msi" `
              "artifacts\$env:PACKAGE_NAME.msi.sha256" `
              --repo $env:GITHUB_REPOSITORY `
              --title "Kanidm Windows CLI $env:KANIDM_TAG" `
              --notes $notes
          }
